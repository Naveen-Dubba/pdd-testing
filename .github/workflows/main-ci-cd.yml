name: Complete CI/CD Workflow

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # -----------------------------------------------------
  # 1. Build Flutter Web App
  # -----------------------------------------------------
  build-flutter-web:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Flutter Web (Release)
        # Sets the base URL so that it works correctly on GitHub Pages
        run: flutter build web --release --base-href "/pdd-testing/"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-dist
          path: build/web/
          retention-days: 1

  # -----------------------------------------------------
  # 2. Deploy to GitHub Pages
  # -----------------------------------------------------
  deploy-gh-pages:
    name: Deploy to GitHub Pages
    needs: build-flutter-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://Naveen-Dubba.github.io/pdd-testing/
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-dist
          path: dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

  # -----------------------------------------------------
  # 3. Verify Live Deployment
  # -----------------------------------------------------
  verify-deployment:
    name: Verify Live Deployment
    needs: deploy-gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Deployment
        run: |
          echo "Waiting 30 seconds for GitHub Pages CDN to clear cache and update..."
          sleep 30
          
      - name: Verify URL Status
        run: |
          URL="https://Naveen-Dubba.github.io/pdd-testing/"
          echo "Pinging $URL..."
          STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" $URL)
          if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 301 ] || [ "$STATUS" -eq 302 ]; then
            echo "Deployment verified! Status: $STATUS"
          else
            echo "Warning: Expected 200, got $STATUS. The test may fail if the site is not fully up."
          fi

  # -----------------------------------------------------
  # 4. Web Test Cases (Selenium)
  # -----------------------------------------------------
  selenium-e2e-tests:
    name: Selenium E2E Web Tests
    needs: verify-deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Selenium Dependencies
        working-directory: ./selenium-tests
        run: npm install

      - name: Run Web Selenium E2E Tests
        working-directory: ./selenium-tests
        run: npm test || true

      - name: Generate Markdown Summary
        working-directory: ./selenium-tests
        run: node generate_summary.js || true

      - name: Publish Summary to GitHub Step
        run: |
          if [ -f selenium-tests/summary.md ]; then
            cat selenium-tests/summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Web Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Web-Test-Reports
          path: |
            selenium-tests/reports/
            selenium-tests/screenshots/
            selenium-tests/*.xlsx
          retention-days: 14

  # -----------------------------------------------------
  # 5. App Test Cases (Appium)
  # -----------------------------------------------------
  appium-tests:
    name: Appium Mobile Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (for Appium)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install and Run Appium Server
        run: |
          npm install -g appium
          appium &
          sleep 5

      - name: Run App Tests
        working-directory: ./appium-tests
        run: |
          pip install -r requirements.txt
          python -m pytest tests/ -v --html=reports/report.html --self-contained-html || true

      - name: Upload App Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: App-Test-Reports
          path: |
            appium-tests/reports/
            appium-tests/screenshots/
            appium-tests/*.xlsx
          retention-days: 14

  # -----------------------------------------------------
  # 6. APK Release (Flutter Build)
  # -----------------------------------------------------
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build APK (Release)
        run: flutter build apk --release

      - name: Upload APK Release
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  # -----------------------------------------------------
  # 7. Load Testing (k6)
  # -----------------------------------------------------
  load-testing:
    name: k6 Load Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run k6 Load Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: load-tests/k6-load-test.js
        continue-on-error: true

      - name: Publish Load Test Summary
        if: always()
        run: |
          if [ -f summary.md ]; then
            cat summary.md >> $GITHUB_STEP_SUMMARY
          fi
