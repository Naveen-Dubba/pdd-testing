name: Deploy and Test

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci || npm install

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Backend Dependencies
        working-directory: ./aivastra-backend-main
        run: pip install -r requirements.txt

      - name: Start Backend
        working-directory: ./aivastra-backend-main
        run: |
          python aivastra_app.py &
          echo "Backend started"
          sleep 10
          curl -f http://127.0.0.1:5000/ || echo "Backend check failed but continuing"

      - name: Wait for GitHub Pages Deployment
        run: |
          URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "Waiting for $URL to be available..."
          for i in {1..30}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "Deployment is live!"
              break
            fi
            echo "Waiting... (Status: $HTTP_STATUS)"
            sleep 10
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Selenium Test Dependencies
        working-directory: ./selenium-tests
        run: npm ci || npm install

      - name: Run Selenium E2E Tests
        working-directory: ./selenium-tests
        env:
          BASE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          HEADLESS: "true"
        run: npm test || true

      - name: Generate Reports
        if: always()
        working-directory: ./selenium-tests
        run: node reporter.js

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Test-Reports
          path: "./selenium-tests/Test Results/"

      - name: Write Summary
        if: always()
        run: |
          if [ -f "./selenium-tests/Test Results/Summary/summary.md" ]; then
            cat "./selenium-tests/Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "Summary file not found." >> $GITHUB_STEP_SUMMARY
          fi
