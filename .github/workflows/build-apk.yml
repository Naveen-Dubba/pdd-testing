name: Build Flutter APK

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: 4. Install Dependencies
        run: flutter pub get

      - name: Inject Secrets
        run: |
          mkdir -p lib/core
          echo "" | base64 -d > lib/core/secrets.dart

      - name: 5. Build APK
        run: flutter build apk --debug > flutter_build.log 2>&1
        continue-on-error: true
      - name: 6. Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vastranaveen-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
          
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Release v1.0.${{ github.run_number }}"
          files: build/app/outputs/**/*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 7. Upload Build Log
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-log
          path: flutter_build.log
          retention-days: 14

      - name: 8. Commit Log for Debugging
        if: always()
        run: |
          cat flutter_build.log || true
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f flutter_build.log
          git commit -m "Add flutter build log for debugging [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main
