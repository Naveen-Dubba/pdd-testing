name: Report + Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  web-tests:
    name: Selenium E2E Web + API Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: 'selenium-tests/package-lock.json'

    - name: Install dependencies
      run: |
        cd selenium-tests
        npm install

    - name: Run Web Selenium E2E Tests
      env:
        HEADLESS: 'true'
      run: |
        cd selenium-tests
        npm test || true

    - name: Upload Web Test Report
      uses: actions/upload-artifact@v4
      with:
        name: Web-Test-Report
        path: selenium-tests/reports/

  deploy-gh-pages:
    name: Deploy to GitHub Pages
    needs: web-tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install dependencies
      run: |
        cd frontend
        npm install

    - name: Build Web App
      run: |
        cd frontend
        npm run build

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./frontend/dist

  appium-tests:
    name: Appium Mobile Tests Dry-Run
    runs-on: macos-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'appium-tests/requirements.txt'

    - name: Install Dependencies
      run: |
        cd appium-tests
        pip install -r requirements.txt

    - name: Run Appium Dry Run Tests
      run: |
        cd appium-tests
        python -m pytest tests/ -v || true

  generate-report:
    name: Generate Vastra Test Report
    needs: appium-tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Openpyxl
      run: |
        pip install openpyxl

    - name: Upload App Test Report
      uses: actions/upload-artifact@v4
      with:
        name: App-Test-Report
        path: appium-tests/reports/
