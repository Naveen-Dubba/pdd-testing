name: React CI/CD and Selenium E2E Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python (Backend)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r aivastra-backend-main/requirements.txt

      - name: Start Flask Backend (Background)
        env:
          DATABASE_URL: sqlite:///aivastra.db
          SECRET_KEY: test_secret_key_for_ci
          PORT: 5000
        run: |
          nohup python aivastra-backend-main/aivastra_app.py > flask.log 2>&1 &
          echo "Flask backend started in background"
          sleep 3

      - name: Set up Node.js (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build React Application
        working-directory: ./frontend
        run: npm run build

      - name: Start Vite Dev Server (Background)
        working-directory: ./frontend
        run: |
          nohup npm run dev -- --host 127.0.0.1 --port 5173 > vite.log 2>&1 &
          echo "Vite server started in background"
          sleep 5

      - name: Verify Servers are Live
        run: |
          curl -s http://localhost:5000/ || (cat flask.log && exit 1)
          curl -s http://localhost:5173/ || (cat frontend/vite.log && exit 1)

      - name: Set up Chrome and Driver
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Selenium Test Dependencies
        working-directory: ./frontend/selenium-tests
        run: npm install

      - name: Run Selenium E2E Login Tests
        env:
          HEADLESS: 'true'
        working-directory: ./frontend/selenium-tests
        run: npm test

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          publish_branch: gh-pages
